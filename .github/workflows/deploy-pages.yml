name: Build & Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/github-pages-deployment-ObAw5
    paths:
      - "data/processed/**"
      - "src/**"
      - "notebooks/**"
      - "docs/**"
      - "figures/**"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --quiet \
            pandas numpy matplotlib seaborn pyarrow \
            plotly requests \
            "nbconvert>=7.0" jupyter

      - name: Regenerar figuras desde parquets
        run: python3 src/generar_figuras.py
        continue-on-error: true

      - name: Prepare site output directory
        run: |
          mkdir -p _site
          cp -r figures _site/
          cp -r docs/. _site/

      - name: Convert notebook to HTML
        run: |
          jupyter nbconvert \
            --to html \
            --output-dir _site \
            --output chile_public_procurement_analysis \
            notebooks/chile_public_procurement_analysis.ipynb

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
